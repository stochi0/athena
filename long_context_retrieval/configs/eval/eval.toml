# Smoke / local eval (same shape as `lhaw/configs/eval/standard.toml`).
# Run from `long_context_retrieval/`:
#   uv run prime eval run configs/eval/eval.toml --skip-upload
# Generate tasks first:
#   uv run python scripts/build_dataset.py

model = "z-ai/glm-4.7"
api_base_url = "https://api.pinference.ai/api/v1"
api_key_var = "PRIME_API_KEY"

num_examples = 8
rollouts_per_example = 1
max_concurrent = 16
save_results = true
debug = false

[[eval]]
env_id = "long_context_retrieval"
env_dir_path = "."
state_columns = ["workspace", "final_answer", "stop_condition"]

[eval.env_args]
dataset_path = "contexts/tasks/dataset.jsonl"
max_examples = 8

sub_model = "openai/gpt-4.1-nano"
repl_language = "python"
max_turns = 200
sub_llm_max_turns = 60
max_sub_llm_parallelism = 8
max_output_length = 8192

code_execution_timeout = 180
abort_on_code_timeout = false
max_startup_wait_seconds = 120
pip_install_packages = "chromadb networkx pypdf"

sandbox_docker_image = "python:3.11-slim"
sandbox_cpu_cores = 4
sandbox_memory_gb = 8
sandbox_disk_size_gb = 20
sandbox_gpu_count = 0
sandbox_timeout_minutes = 30
sandbox_labels = ["long-context-retrieval"]
