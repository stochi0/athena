# Minimal RL run (2 examples) — smoke test for Hosted Training.
#   prime rl run configs/rl/long-context-retrieval.toml -e WANDB_API_KEY -e PRIME_API_KEY -e OPENAI_API_KEY

name = "long-context-retrieval-2ex-test"
model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 2
batch_size = 2
rollouts_per_example = 1
# env_file = ["secrets.env"]

[[env]]
id = "YOUR_USERNAME/long_context_retrieval"

# Same scope as `lhaw` / `configs/eval/eval.toml` [eval.env_args]; extra RLM kwargs pass through.
[env.args]
dataset_path = "contexts/tasks/dataset.jsonl"
max_examples = 2
sub_model = "openai/gpt-4.1-nano"
repl_language = "python"
max_turns = 200
sub_llm_max_turns = 60
max_sub_llm_parallelism = 8
max_output_length = 8192
code_execution_timeout = 180
abort_on_code_timeout = false
max_startup_wait_seconds = 120
pip_install_packages = "chromadb networkx pypdf"
sandbox_docker_image = "python:3.11-slim"
sandbox_cpu_cores = 1
sandbox_memory_gb = 2
sandbox_disk_size_gb = 5
sandbox_gpu_count = 0
sandbox_timeout_minutes = 60

[wandb]
project = "long-context-retrieval"
entity = "YOUR_WANDB_TEAM"
name = "qwen3-30b-i-long-context-retrieval-2ex"
