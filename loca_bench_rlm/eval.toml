# Standalone smoke test for the LOCA-bench RLM environment.
#
# Run from this directory:
#   cd loca_bench_rlm
#   unset PRIME_API_KEY  # if your repo-level .env contains an inference-only key
#   prime eval run eval.toml

provider = "prime"
model = "z-ai/glm-4.7"
num_examples = 1
rollouts_per_example = 1
max_concurrent = 1
save_results = true
debug = true
disable_env_server = true

[[eval]]
env_id = "loca_bench_rlm"
env_dir_path = "."
state_columns = [
  "loca_task_name",
  "loca_eval_reward",
  "loca_eval_info",
  "final_answer",
  "stop_condition",
]

[eval.env_args]
config_path = "task_configs/debug.json"
max_examples = 1
repl_language = "python"
max_turns = 2000
code_execution_timeout = 90
sandbox_timeout_minutes = 30
