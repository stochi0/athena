# Ambiguity class: divergent.
# uv run prime eval run configs/eval/slice_divergent.toml

model = "z-ai/glm-4.7"
api_base_url = "https://api.pinference.ai/api/v1"
api_key_var = "PRIME_API_KEY"

num_examples = 24
rollouts_per_example = 1
max_concurrent = 2

save_results = true
debug = false

[[eval]]
env_id = "lhaw_rlm"
env_dir_path = "."
state_columns = ["final_answer", "stop_condition", "info"]

[eval.env_args]
split = "test"
source_dataset = "all"
ambiguity_class = "divergent"
information_dimension = "all"
max_examples = 24
shuffle = true
seed = 23
include_env_tips = false

reward_mode = "reconstruction_judge"
judge_model = "openai/gpt-4.1-mini"
user_simulator_model = "openai/gpt-4.1-mini"
sub_model = "openai/gpt-4.1-nano"
repl_language = "python"
max_turns = 22
sub_llm_max_turns = 12
max_sub_llm_parallelism = 16
max_output_length = 8192

code_execution_timeout = 90
abort_on_code_timeout = false
max_startup_wait_seconds = 120
pip_install_packages = ""

sandbox_docker_image = "python:3.11-slim"
sandbox_cpu_cores = 1
sandbox_memory_gb = 2
sandbox_disk_size_gb = 5
sandbox_gpu_count = 0
sandbox_timeout_minutes = 30
sandbox_labels = ["lhaw-rlm", "amb-divergent"]
