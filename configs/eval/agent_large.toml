# Large / frontier agent; stronger judge + simulator; higher token cap.
# uv run prime eval run configs/eval/agent_large.toml

model = "openai/gpt-4.1"
api_base_url = "https://api.pinference.ai/api/v1"
api_key_var = "PRIME_API_KEY"

num_examples = 32
rollouts_per_example = 1
max_concurrent = 1

save_results = true
debug = false

[[eval]]
env_id = "lhaw_rlm"
env_dir_path = "."
state_columns = ["final_answer", "stop_condition", "info"]

[eval.env_args]
split = "test"
source_dataset = "all"
ambiguity_class = "all"
information_dimension = "all"
max_examples = 32
shuffle = true
seed = 42
include_env_tips = false

reward_mode = "reconstruction_judge"
judge_model = "openai/gpt-4.1"
user_simulator_model = "openai/gpt-4.1-mini"
sub_model = "openai/gpt-4.1-mini"
repl_language = "python"
max_turns = 28
sub_llm_max_turns = 16
max_sub_llm_parallelism = 16
max_output_length = 24576

code_execution_timeout = 120
abort_on_code_timeout = false
max_startup_wait_seconds = 180
pip_install_packages = ""

sandbox_docker_image = "python:3.11-slim"
sandbox_cpu_cores = 2
sandbox_memory_gb = 4
sandbox_disk_size_gb = 8
sandbox_gpu_count = 0
sandbox_timeout_minutes = 45
sandbox_labels = ["lhaw-rlm", "tier-large"]
