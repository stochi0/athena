# Smoke eval for the LHAW RLM environment (ScaleAI/lhaw + ask_user + judge).
#
# Root model runs the RLM REPL; `judge_model` / `user_simulator_model` use the same
# inference stack as the eval client unless you pass `client_config` / role overrides
# from Python (see `EnvironmentConfig` in `lhaw_rlm.core.config`).
#
# Run from inside this package directory (same idea as LOCA smoke evals):
#   cd lhaw_rlm
#   prime eval run configs/eval.toml
#
# Requires `lhaw_rlm` importable (e.g. `uv sync` from the `lhaw` repo root).

model = "z-ai/glm-5"
api_base_url = "https://api.pinference.ai/api/v1"
api_key_var = "PRIME_API_KEY"
num_examples = 1
rollouts_per_example = 1
max_concurrent = 1
save_results = true
debug = true

[[eval]]
env_id = "lhaw_rlm"
env_dir_path = "."
state_columns = [
  "final_answer",
  "stop_condition",
  "info",
]

[eval.env_args]
# Dataset / filters (HF: ScaleAI/lhaw)
split = "test"
source_dataset = "all"
ambiguity_class = "all"
information_dimension = "all"
max_examples = 1
shuffle = false
include_env_tips = false

# Models: root rollout uses `model` above; sub-LLM and sidecars below
judge_model = "z-ai/glm-4.7"
user_simulator_model = "openai/gpt-4.1-mini"
repl_language = "python"
max_turns = 20
sub_model = "openai/gpt-4.1-nano"
sub_llm_max_turns = 12
max_sub_llm_parallelism = 16
max_output_length = 8192
code_execution_timeout = 90
abort_on_code_timeout = false
max_startup_wait_seconds = 120
pip_install_packages = ""
sandbox_docker_image = "python:3.11-slim"
sandbox_cpu_cores = 1
sandbox_memory_gb = 2
sandbox_disk_size_gb = 5
sandbox_gpu_count = 0
sandbox_timeout_minutes = 30
sandbox_labels = ["lhaw-rlm"]
