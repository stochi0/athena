# Smoke eval config for advanced_if (see advanced_if.py).
# Relative to this file's directory (advanced_if/configs/), not the repo root.
endpoints_path = "."

model = "openai/gpt-4.1-mini"
api_base_url = "https://api.pinference.ai/api/v1"
api_key_var = "PRIME_API_KEY"
num_examples = 5
rollouts_per_example = 1
max_concurrent = 1
save_results = true

[[eval]]
env_id = "advanced_if"
env_dir_path = "."

[eval.sampling_args]
temperature = 0.2
max_tokens = 1000

[eval.env_args]
dataset_name = "facebook/AdvancedIF"
dataset_split = "train"
max_examples = 5
judge_model = "gpt-4.1-mini"
